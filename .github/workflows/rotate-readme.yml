name: Rotate weekly README content

on:
  schedule:
    - cron: '0 0 * * 1'  # every Monday at midnight UTC
  workflow_dispatch:       # lets you trigger it manually too

jobs:
  rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run rotation script
        run: node .github/scripts/rotate.js

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: rotate weekly algorithm"
          git push
